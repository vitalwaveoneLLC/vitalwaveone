<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff" rx="16"/>

  <!-- Gradient for logo circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo circle -->
  <circle cx="100" cy="60" r="35" fill="url(#logoGradient)"/>

  <!-- VW initials -->
  <text x="100" y="75" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">VW</text>

  <!-- VitalWaveOne text -->
  <text x="100" y="140" font-size="18" font-weight="bold" fill="#0a1628" text-anchor="middle" font-family="Arial, sans-serif">VitalWaveOne</text>

  <!-- LLC text -->
  <text x="100" y="162" font-size="11" font-weight="500" fill="#6b7280" text-anchor="middle" font-family="Arial, sans-serif">LLC</text>
</svg>
