name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Security Check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('frontend/package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('api/package.json', 'utf8'))"
      - name: ✅ Security audit passed
        run: echo "VitalWaveOne security check complete"
